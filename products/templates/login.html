<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ===============================
           GLOBAL FIX
        =================================*/
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff6f8, #f9f3ff);
            min-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Bottom Shape */
        body::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80%;
            background: #7a4e4e;
            clip-path: ellipse(120% 60% at 50% 100%);
            z-index: 0;
        }

        /* ===============================
           CARD WRAPPER
        =================================*/
        .login-card {
            position: relative;
            z-index: 1;
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
        }

        .login-title {
            font-size: 28px;
            font-weight: 600;
            color: #7a4e4e;
            margin-bottom: 30px;
            font-family: 'Playfair Display', serif;

        }

        /* ===============================
           FORM FIX
        =================================*/
        form {
            width: 100%;
        }

        form p {
            margin-bottom: 18px;
            width: 100%;
            font-family: 'Poppins', sans-serif;

        }

        form label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        form input {
            width: 100%;
            max-width: 100%;
            padding: 12px 14px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: 0.3s ease;
        }

        form input:focus {
            outline: none;
            border-color: #7a4e4e;
            box-shadow: 0 0 0 3px rgba(122, 78, 78, 0.15);
        }

        .forgot-link {
            font-size: 13px;
            color: #7a4e4e;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            margin-top: 18px;
            background: #7a4e4e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .login-btn:hover {
            background: #5c3737;
        }

        .bottom-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .home-link {
            color: #7a4e4e;
            font-weight: 600;
            text-decoration: none;
            font-size: 14px;
        }

        .home-link:hover {
            text-decoration: underline;
        }

        /* ===============================
           RESPONSIVE
        =================================*/
        @media (max-width: 500px) {

            .login-card {
                padding: 30px 20px;
            }

            .login-title {
                font-size: 22px;
            }

            body::after {
                height: 65%;
                clip-path: polygon(0 45%, 100% 30%, 100% 100%, 0% 100%);
            }
        }
    </style>
</head>

<body>

    <div class="login-card">

        <div class="login-title">
            Admin Login
        </div>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}


            <button type="submit" class="login-btn">
                Sign In
            </button>
        </form>

        <div class="bottom-section">
            <a href="{% url 'home' %}" class="home-link">
                ← Go to Home
            </a>
        </div>

    </div>

</body>

</html>
